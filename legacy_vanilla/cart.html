<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - NK Dairy Products</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand" onclick="location.href='index.html'" style="cursor: pointer;">
                <i class="fas fa-store"></i>
                <span>NK Dairy Products</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="nav-actions">
                <a href="cart.html" class="cart-icon active">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" id="cartCount">0</span>
                </a>
                <button onclick="checkLoginAndRedirect()" class="btn-login" id="userBtn">Login</button>
            </div>
        </div>
    </nav>

    <!-- Cart Section -->
    <section class="cart-section">
        <div class="container">
            <h1>Shopping Cart</h1>
            
            <div class="cart-content" id="cartContent">
                <!-- Empty cart message -->
                <div id="emptyCart" class="empty-cart">
                    <i class="fas fa-shopping-cart"></i>
                    <h3>Your cart is empty</h3>
                    <p>Add some delicious ghee products to your cart!</p>
                    <button onclick="location.href='products.html'" class="btn-primary">Browse Products</button>
                </div>
                
                <!-- Cart items -->
                <div id="cartItems" class="cart-items" style="display: none;">
                    <!-- Cart items will be loaded dynamically -->
                </div>
                
                <!-- Cart Summary -->
                <div id="cartSummary" class="cart-summary" style="display: none;">
                    <h3>Order Summary</h3>
                    <div class="summary-row">
                        <span>Subtotal:</span>
                        <span id="subtotal">₹0</span>
                    </div>
                    <div class="summary-row">
                        <span>Delivery:</span>
                        <span id="delivery">₹0</span>
                    </div>
                    <div class="summary-row">
                        <span>Tax (5%):</span>
                        <span id="tax">₹0</span>
                    </div>
                    <div class="summary-divider"></div>
                    <div class="summary-row total">
                        <span>Total:</span>
                        <span id="total">₹0</span>
                    </div>
                    <button onclick="proceedToCheckout()" class="btn-primary btn-block">Proceed to Checkout</button>
                    <button onclick="location.href='products.html'" class="btn-secondary btn-block">Continue Shopping</button>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 NK Dairy Products. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script src="cart.js"></script>
</body>
</html>
