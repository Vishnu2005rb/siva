<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - NK Dairy Products</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand" onclick="location.href='index.html'" style="cursor: pointer;">
                <i class="fas fa-store"></i>
                <span>NK Dairy Products</span>
            </div>
        </div>
    </nav>

    <!-- Checkout Section -->
    <section class="checkout-section">
        <div class="container">
            <h1>Checkout</h1>
            
            <!-- Progress Steps -->
            <div class="checkout-steps">
                <div class="step active">
                    <div class="step-number">1</div>
                    <div class="step-label">Shipping</div>
                </div>
                <div class="step" id="step2">
                    <div class="step-number">2</div>
                    <div class="step-label">Payment</div>
                </div>
                <div class="step" id="step3">
                    <div class="step-number">3</div>
                    <div class="step-label">Confirmation</div>
                </div>
            </div>
            
            <div class="checkout-content">
                <!-- Shipping Form -->
                <div id="shippingForm" class="checkout-form">
                    <h2>Shipping Information</h2>
                    <form id="addressForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="firstName">First Name *</label>
                                <input type="text" id="firstName" required>
                            </div>
                            <div class="form-group">
                                <label for="lastName">Last Name *</label>
                                <input type="text" id="lastName" required>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="email">Email *</label>
                            <input type="email" id="email" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="phone">Phone Number *</label>
                            <input type="tel" id="phone" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="address">Address *</label>
                            <input type="text" id="address" required>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="city">City *</label>
                                <input type="text" id="city" required>
                            </div>
                            <div class="form-group">
                                <label for="state">State *</label>
                                <input type="text" id="state" required>
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="pincode">PIN Code *</label>
                                <input type="text" id="pincode" required>
                            </div>
                            <div class="form-group">
                                <label for="country">Country *</label>
                                <input type="text" id="country" value="India" required>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn-primary btn-block">Continue to Payment</button>
                    </form>
                </div>
                
                <!-- Payment Form -->
                <div id="paymentForm" class="checkout-form" style="display: none;">
                    <h2>Payment Method</h2>
                    
                    <div class="payment-methods">
                        <label class="payment-option">
                            <input type="radio" name="payment" value="card" checked>
                            <div class="payment-card">
                                <i class="fas fa-credit-card"></i>
                                <span>Credit/Debit Card</span>
                            </div>
                        </label>
                        
                        <label class="payment-option">
                            <input type="radio" name="payment" value="upi">
                            <div class="payment-card">
                                <i class="fas fa-mobile-alt"></i>
                                <span>UPI</span>
                            </div>
                        </label>
                        
                        <label class="payment-option">
                            <input type="radio" name="payment" value="netbanking">
                            <div class="payment-card">
                                <i class="fas fa-university"></i>
                                <span>Net Banking</span>
                            </div>
                        </label>
                        
                        <label class="payment-option">
                            <input type="radio" name="payment" value="cod">
                            <div class="payment-card">
                                <i class="fas fa-money-bill-wave"></i>
                                <span>Cash on Delivery</span>
                            </div>
                        </label>
                    </div>
                    
                    <!-- Card Payment Details -->
                    <div id="cardDetails" class="payment-details">
                        <div class="form-group">
                            <label for="cardNumber">Card Number *</label>
                            <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19">
                        </div>
                        
                        <div class="form-group">
                            <label for="cardName">Cardholder Name *</label>
                            <input type="text" id="cardName" placeholder="Name on card">
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="expiry">Expiry Date *</label>
                                <input type="text" id="expiry" placeholder="MM/YY" maxlength="5">
                            </div>
                            <div class="form-group">
                                <label for="cvv">CVV *</label>
                                <input type="text" id="cvv" placeholder="123" maxlength="3">
                            </div>
                        </div>
                    </div>
                    
                    <!-- UPI Details -->
                    <div id="upiDetails" class="payment-details" style="display: none;">
                        <div class="form-group">
                            <label for="upiId">UPI ID *</label>
                            <input type="text" id="upiId" placeholder="username@upi">
                        </div>
                    </div>
                    
                    <!-- Net Banking Details -->
                    <div id="netbankingDetails" class="payment-details" style="display: none;">
                        <div class="form-group">
                            <label for="bank">Select Bank *</label>
                            <select id="bank">
                                <option value="">Choose your bank</option>
                                <option value="sbi">State Bank of India</option>
                                <option value="hdfc">HDFC Bank</option>
                                <option value="icici">ICICI Bank</option>
                                <option value="axis">Axis Bank</option>
                                <option value="pnb">Punjab National Bank</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="checkout-actions">
                        <button onclick="backToShipping()" class="btn-secondary">Back</button>
                        <button onclick="processPayment()" class="btn-primary">Place Order</button>
                    </div>
                </div>
                
                <!-- Order Summary Sidebar -->
                <div class="order-summary-sidebar">
                    <h3>Order Summary</h3>
                    <div id="orderItems" class="order-items">
                        <!-- Items will be loaded dynamically -->
                    </div>
                    <div class="summary-divider"></div>
                    <div class="summary-row">
                        <span>Subtotal:</span>
                        <span id="summarySubtotal">₹0</span>
                    </div>
                    <div class="summary-row">
                        <span>Delivery:</span>
                        <span id="summaryDelivery">₹0</span>
                    </div>
                    <div class="summary-row">
                        <span>Tax (5%):</span>
                        <span id="summaryTax">₹0</span>
                    </div>
                    <div class="summary-divider"></div>
                    <div class="summary-row total">
                        <span>Total:</span>
                        <span id="summaryTotal">₹0</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 NK Dairy Products. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script src="checkout.js"></script>
</body>
</html>
